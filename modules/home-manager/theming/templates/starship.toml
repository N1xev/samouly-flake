"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Maximum time it may take to produce the prompt
command_timeout = 3000

# Note: Not supported in Powershell
# @see: https://starship.rs/advanced-config/#enable-right-prompt
right_format = """
[](bg:transparent fg:{{colors.surface.dark.hex}})\
$time\
$memory_usage\
[](fg:{{colors.surface.dark.hex}} bg:transparent)\
"""

# Left prompt. This is displayed on the left side of the terminal.
# Colours (i.e. bg and fg) are always listed from left to right.
format = """
[](bg:#transparent fg:{{colors.primary.dark.hex}})\
$os\
$username\
[](fg:{{colors.primary.dark.hex}} bg:{{colors.surface.dark.hex}})\
$directory\
${custom.pregit}\
$git_branch\
$git_state\
$git_metrics\
$git_status\
${custom.postgit}\
${custom.nogit}\
$package\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$bun\
$nim\
$rust\
$scala\
$docker_context\
$character\
$line_break\
[  ](bold fg:{{colors.primary.dark.hex}})\
"""

########################
#   Special sections   #
########################

# Exit code indicator
[character] # The name of the module we are configuring is 'character'
success_symbol = '[](bg:{{colors.surface_container.dark.hex}} fg:{{colors.primary.dark.hex}})[󱇫](bg:{{colors.primary.dark.hex}} fg:{{colors.background.dark.hex}})[](fg:{{colors.primary.dark.hex}} bg:transparent)'
error_symbol = '[](bg:{{colors.surface_container.dark.hex}} fg:{{colors.secondary.dark.hex}})[󱇫](bg:{{colors.secondary.dark.hex}} fg:{{colors.error_container.dark.hex}})[](fg:{{colors.secondary.dark.hex}} bg:transparent)'
format = '$symbol '

# cross-platform way to check if we are in a git repo, takes 200ms
[custom.nogit]
when = ''' git rev-parse --git-dir ; test $? = False '''
format = '[ ](bg:{{colors.surface.dark.hex}})'
disabled = true

# Either `Administrator`, `root` or the current user's username.
[username]
show_always = true
style_user = "bg:{{colors.primary.dark.hex}} fg:{{colors.background.dark.hex}}"
style_root = "bg:{{colors.primary.dark.hex}} fg:{{colors.background.dark.hex}}"
format = '[ $user]($style)'
disabled = false


# Displays a symbol that represents the current operating system
[os]
style = "bg:{{colors.primary.dark.hex}} fg:{{colors.background.dark.hex}}"
format = '[$symbol]($style)'
disabled = false                # This doesn't work in pwsh in Webstorm terminal.

# The current directory
[directory]
style = "bg:{{colors.surface.dark.hex}} fg:{{colors.on_background.dark.hex}}"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "…/"

[hostname]
ssh_symbol = ""

[memory_usage]
symbol = "󰍛"

[time]
disabled = false
time_format = "%R"         # Hour:Minute Format
style = "bg:{{colors.surface.dark.hex}}"
format = '[$time]($style)'

#######################
#   Version control   #
#######################


[git_branch]
symbol = ""
style = "bg:{{colors.surface_container.dark.hex}} fg:{{colors.outline.dark.hex}}"
format = '[](fg:{{colors.surface.dark.hex}} bg:{{colors.surface_container.dark.hex}})[ $symbol](bg:{{colors.surface_container.dark.hex}} fg:{{colors.primary.dark.hex}})[ $branch ]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING ](bg:{{colors.surface_container.dark.hex}} fg:bold red)'
rebase = '[ REBASING ](bg:{{colors.surface_container.dark.hex}} fg:bold green)'
merge = '[ MERGING ](bg:{{colors.surface_container.dark.hex}} fg:bold yellow)'
bisect = '[🔍 BISECTING ](bg:{{colors.surface_container.dark.hex}} fg:bold blue)'
am = '[AM](bg:{{colors.surface_container.dark.hex}} fg:bold green)'
am_or_rebase = '[AM/REBASE ](bg:{{colors.surface_container.dark.hex}} fg:bold green)'
revert = '[󰕍 REVERTING ](bg:{{colors.surface_container.dark.hex}} fg:bold red)'

[git_metrics]
added_style = "bg:{{colors.surface_container.dark.hex}} fg:{{colors.secondary.dark.hex}}"
deleted_style = "bg:{{colors.surface_container.dark.hex}} fg:{{colors.primary.dark.hex}}"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'
disabled = false

[git_status]
style = "bg:{{colors.surface_container.dark.hex}} fg:{{colors.primary.dark.hex}}"
conflicted = '='                                                                          # This branch has merge conflicts.
ahead = ''
behind = ''
diverged = '󱡷'
up_to_date = ''
untracked = '?'
stashed = ''
modified = ''
staged = ''
renamed = '»'
deleted = '✘'
format = '([($all_status )($ahead_behind )]($style))[🔍 BISECTING](bg:{{colors.surface_container.dark.hex}} fg:{{colors.surface.dark.hex}})'

[fossil_branch]
symbol = ""

[hg_branch]
symbol = ""

[pijul_channel]
symbol = ""

############################
#   Contexts (canonical)   #
############################

[nodejs]
symbol = ""
style = "bg:{{colors.surface.dark.hex}} fg:{{colors.on_background.dark.hex}}"
format = '[$symbol](bg:{{colors.surface.dark.hex}} fg:{{colors.primary.dark.hex}})[ ($version) ]($style)'

[bun]
symbol = ""
style = "bg:{{colors.surface.dark.hex}} fg:{{colors.on_background.dark.hex}}"
format = '[$symbol](bg:{{colors.surface.dark.hex}} fg:{{colors.primary.dark.hex}})[ ($version) ]($style)'

[docker_context]
symbol = ""
style = "bg:{{colors.surface.dark.hex}} fg:{{colors.on_background.dark.hex}}"
format = '[$symbol](bg:{{colors.surface.dark.hex}} fg:{{colors.primary.dark.hex}})[ (context) ]($style)'

[package]
format = '($style)[> $symbol$version ]($style)'
symbol = '📦 '
version_format = 'v${raw}'
style = 'bold 208 bg:{{colors.surface.dark.hex}}'
display_private = false
disabled = true
